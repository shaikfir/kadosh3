<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Body -->
  <ellipse cx="100" cy="115" rx="55" ry="50" fill="#8B5E3C"/>
  <!-- Butt (red) -->
  <ellipse cx="100" cy="145" rx="35" ry="28" fill="#D94444"/>
  <ellipse cx="100" cy="148" rx="28" ry="22" fill="#E85555"/>
  <!-- Head -->
  <circle cx="100" cy="55" r="32" fill="#A0724A"/>
  <!-- Face -->
  <ellipse cx="100" cy="62" rx="22" ry="18" fill="#D4A76A"/>
  <!-- Eyes -->
  <circle cx="90" cy="52" r="5" fill="#fff"/>
  <circle cx="110" cy="52" r="5" fill="#fff"/>
  <circle cx="91" cy="53" r="2.5" fill="#222"/>
  <circle cx="111" cy="53" r="2.5" fill="#222"/>
  <!-- Eyebrows (cheeky) -->
  <path d="M84 47 Q90 43 96 47" fill="none" stroke="#5C3A1E" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M104 47 Q110 43 116 47" fill="none" stroke="#5C3A1E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mouth (grinning) -->
  <path d="M88 70 Q100 80 112 70" fill="none" stroke="#5C3A1E" stroke-width="2" stroke-linecap="round"/>
  <!-- Ears -->
  <circle cx="68" cy="48" r="10" fill="#A0724A"/>
  <circle cx="68" cy="48" r="6" fill="#D4A76A"/>
  <circle cx="132" cy="48" r="10" fill="#A0724A"/>
  <circle cx="132" cy="48" r="6" fill="#D4A76A"/>
  <!-- Arms -->
  <path d="M50 100 Q30 90 35 110 Q40 125 55 120" fill="#8B5E3C" stroke="#7A5232" stroke-width="1"/>
  <path d="M150 100 Q170 90 165 110 Q160 125 145 120" fill="#8B5E3C" stroke="#7A5232" stroke-width="1"/>
  <!-- Legs -->
  <ellipse cx="75" cy="165" rx="15" ry="10" fill="#8B5E3C"/>
  <ellipse cx="125" cy="165" rx="15" ry="10" fill="#8B5E3C"/>
  <!-- Tail -->
  <path d="M60 140 Q30 130 25 155 Q22 170 35 175" fill="none" stroke="#8B5E3C" stroke-width="5" stroke-linecap="round"/>
